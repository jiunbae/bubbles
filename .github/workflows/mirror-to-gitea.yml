name: Mirror to Gitea

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitea
        run: |
          git remote add gitea https://x-access-token:${{ secrets.GITEA_TOKEN }}@gitea.jiun.dev/jiunbae/bubbles.git || true
          git push gitea main --force
