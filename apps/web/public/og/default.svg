  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Bubbles -->
  <circle cx="200" cy="250" r="80" fill="url(#b1)" stroke="rgba(135,206,235,0.3)" stroke-width="2"/>
  <circle cx="400" cy="180" r="55" fill="url(#b2)" stroke="rgba(255,181,194,0.3)" stroke-width="1.5"/>
