      <stop offset="100%" style="stop-color:rgba(135,206,235,0.05)"/>
    </radialGradient>
    <radialGradient id="b2" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,181,194,0.05)"/>
    </radialGradient>
    <radialGradient id="b3" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(152,251,152,0.05)"/>
