services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3002:3001"
    environment:
      PORT: "3001"
      MONGO_URI: "mongodb://mongo:27017/bubbles"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET is required}"
      CORS_ORIGINS: "http://localhost:8080,http://localhost:5173,https://bubbles.jiun.dev"
      NODE_ENV: "production"
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  mongo-data:
