apiVersion: v1
kind: ConfigMap
metadata:
  name: bubbles-web-nginx-config
  labels:
    app: bubbles-web
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback — serve index.html for client-side routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets (Vite hashed filenames)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No proxy_pass directives — in K8s, the Ingress routes
        # /api/ and /ws/ directly to the server Service.

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_min_length 256;
        gzip_types
            text/plain
            text/css
            text/xml
            application/javascript
            application/json
            application/xml
            image/svg+xml;
    }
